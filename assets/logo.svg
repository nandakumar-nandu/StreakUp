<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 100" width="450" height="100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161920" />
      <stop offset="100%" stop-color="#0F1115" />
    </linearGradient>

    <!-- Flame Primary Gradient -->
    <linearGradient id="flamePrimary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF416C" />
      <stop offset="100%" stop-color="#FF4B2B" />
    </linearGradient>

    <!-- Flame Secondary Gradient -->
    <linearGradient id="flameSecondary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFA502" />
      <stop offset="100%" stop-color="#FF4B2B" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Container -->
  <rect width="450" height="100" rx="16" fill="url(#bgGrad)" stroke="#2A2E3D" stroke-width="2" />

  <!-- Logo Icon Container (Left) -->
  <g transform="translate(15, 10)">
    <!-- Glowing background circle -->
    <circle cx="40" cy="40" r="32" fill="#FF4757" fill-opacity="0.1" filter="url(#glow)" />
    <circle cx="40" cy="40" r="30" fill="#1E2330" stroke="#FF4757" stroke-opacity="0.3" stroke-width="1.5" />

    <!-- Flame Path Layer 1 (Outer Flame) -->
    <path d="M 40,60 C 27,60 20,50 20,38 C 20,24 31,16 40,16 C 43,16 45,18 44,21 C 42,24 40,28 40,32 C 40,42 52,45 52,54 C 52,57 47,60 40,60 Z" fill="url(#flamePrimary)" />

    <!-- Flame Path Layer 2 (Inner Flame) -->
    <path d="M 40,56 C 31,56 26,49 26,40 C 26,30 34,24 40,24 C 42,24 43,25 42.5,27 C 41,29 40,32 40,35 C 40,42 48,44 48,51 C 48,53 45,56 40,56 Z" fill="url(#flameSecondary)" opacity="0.9" />

    <!-- Flame Path Layer 3 (Core) -->
    <path d="M 40,52 C 34,52 31,48 31,42 C 31,35 36,31 40,31 C 41,31 41.5,31.5 41.2,32.5 C 40.5,33.5 40,35 40,37 C 40,42 45,43 45,48 C 45,49.5 43,52 40,52 Z" fill="#FFFFFF" opacity="0.95" />
  </g>

  <!-- Typography "StreakUp" (Right) -->
  <g transform="translate(110, 64)">
    <text font-family="System, -apple-system, sans-serif" font-weight="800" font-size="44" letter-spacing="-1">
      <tspan fill="#F1F2F6">Streak</tspan>
      <tspan fill="#FF4757">Up</tspan>
    </text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(112, 82)">
    <text font-family="System, -apple-system, sans-serif" font-weight="600" font-size="12" fill="#747D8C" letter-spacing="1.5">
      HABIT &amp; FITNESS TRACKER
    </text>
  </g>
</svg>
